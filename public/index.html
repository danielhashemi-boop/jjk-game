```html
<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jujutsu Kaisen Game</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#0a0a0a,#1a1a2e,#000);
color:white;
text-align:center;
}

/* Title */

.title{
font-size:60px;
margin-top:80px;
letter-spacing:3px;
color:#ffffff;
text-shadow:0 0 20px #4cc9f0;
}

/* Start button */

.start-btn{
margin-top:40px;
padding:18px 40px;
font-size:22px;
border:none;
border-radius:12px;
background:#4361ee;
color:white;
cursor:pointer;
transition:0.3s;
}

.start-btn:hover{
background:#4cc9f0;
transform:scale(1.05);
}

/* Character section */

.characters{
display:none;
margin-top:60px;
}

.char-card{
display:inline-block;
background:#111;
padding:25px;
margin:20px;
border-radius:15px;
width:200px;
transition:0.3s;
cursor:pointer;
}

.char-card:hover{
transform:scale(1.1);
background:#1e1e1e;
}

.char-name{
font-size:22px;
margin-top:10px;
}

footer{
margin-top:120px;
opacity:0.5;
font-size:14px;
}

</style>

</head>

<body>

<h1 class="title">JUJUTSU KAISEN GAME</h1>

<button class="start-btn" onclick="startGame()">START GAME</button>

<div class="characters" id="characters">

<h2>Choose Your Sorcerer</h2>

<div class="char-card" onclick="selectCharacter('Gojo')">
<div class="char-name">Gojo</div>
</div>

<div class="char-card" onclick="selectCharacter('Yuji')">
<div class="char-name">Yuji</div>
</div>

<div class="char-card" onclick="selectCharacter('Megumi')">
<div class="char-name">Megumi</div>
</div>

</div>

<footer>
JJK Fan Game
</footer>

<script>

function startGame(){
document.querySelector(".start-btn").style.display="none"
document.getElementById("characters").style.display="block"
}

function selectCharacter(name){
alert("You selected " + name)
}

</script>

</body>
</html>
```
